<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="6" y1="4" x2="36" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#31E17A"/>
      <stop offset="0.55" stop-color="#2B86FF"/>
      <stop offset="1" stop-color="#7A3DFF"/>
    </linearGradient>
    <linearGradient id="glow" x1="10" y1="10" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="3" y="3" width="34" height="34" rx="9" fill="url(#bg)"/>
  <path d="M10 9.5C15 7.5 22.5 8 30.5 11.5C33 12.6 34 15.8 33.1 18.2C32 21.2 28.8 19.5 26.3 18.4C19.9 15.5 14.2 15.1 9.2 16.5C7.5 17 6.3 15.9 6.3 14.3C6.3 12 7.9 10.3 10 9.5Z" fill="url(#glow)"/>

  <!-- Center mark: outer + inner hexagon, no nodes; 120° symmetry -->
  <g transform="translate(20 20) scale(1.2) translate(-20 -20)" stroke="#FFFFFF" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer regular hexagon (internal angles 120°), centered -->
    <path d="M20 12.3L26.67 16.15L26.67 23.85L20 27.7L13.33 23.85L13.33 16.15L20 12.3Z"/>

    <!-- inner regular hexagon: 1/3 size of outer, centered -->
    <path d="M20 17.43L22.22 18.72L22.22 21.28L20 22.57L17.78 21.28L17.78 18.72L20 17.43Z"/>

    <!-- three connectors (120° apart), from outer to inner vertices -->
    <path d="M20 12.3L20 17.43"/>
    <path d="M26.67 23.85L22.22 21.28"/>
    <path d="M13.33 23.85L17.78 21.28"/>
  </g>
</svg>